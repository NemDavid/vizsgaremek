version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: mihirunk_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: MiHirunk_DB
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: mihirunk_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: example
    ports:
      - "8080:80"
    depends_on:
      - db

  backend:
    container_name: mihirunk_backend
    build:
      context: ./Backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "6769:6769" # if has proxy dont open port
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: example
      DB_NAME: MiHirunk_DB
      DB_DIALECT: mysql
      NODE_ENV: development
    volumes:
      - ./Backend:/app     # <--- bind mount a friss kódhoz
      - /app/node_modules  # <--- ne írja felül a node_modules-t a host
    command: npm run start   # <--- nodemon automatikusan újraindítja a szervert
    depends_on:
      db:
        condition: service_healthy

  frontend:
    container_name: mihirunk_frontend
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"  # nginx alapból 80-as porton fut if has proxy dont open port
    depends_on:
      - backend

  #nginx or treafik reverse proxy, open port 80 or 443


volumes:
  db_data:
